services:
  - type: web
    name: studyindex
    env: node
    region: singapore   # closest to India — change to "ohio" for US
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_GEMINI_API_KEY
        sync: false        # you'll paste your Gemini API key in the Render dashboard
