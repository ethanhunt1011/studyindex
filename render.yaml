services:
  - type: web
    name: studyindex
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # ── Gemini AI ─────────────────────────────────────────────────────────
      - key: VITE_GEMINI_API_KEY
        sync: false          # paste your key from aistudio.google.com/apikey
      # ── Firebase (paste values from your Firebase project settings) ───────
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_FIRESTORE_ID
        sync: false
