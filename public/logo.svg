<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A5A40"/>
      <stop offset="100%" stop-color="#3F3F2D"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle inner shine -->
  <rect width="100" height="50" rx="22" fill="url(#shine)"/>

  <!-- Open book pages (left) -->
  <path d="M50 68 Q36 65 22 68 L22 32 Q36 28 50 32 Z"
        fill="none" stroke="white" stroke-width="3.2"
        stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>
  <!-- Open book pages (right) -->
  <path d="M50 68 Q64 65 78 68 L78 32 Q64 28 50 32 Z"
        fill="none" stroke="white" stroke-width="3.2"
        stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>
  <!-- Spine -->
  <line x1="50" y1="32" x2="50" y2="68" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>

  <!-- AI sparkle (top-right of book) -->
  <!-- Main star -->
  <path d="M72 24 L73.2 27.8 L77 29 L73.2 30.2 L72 34 L70.8 30.2 L67 29 L70.8 27.8 Z"
        fill="white" opacity="0.95"/>
  <!-- Small dot sparkles -->
  <circle cx="64" cy="22" r="1.3" fill="white" opacity="0.7"/>
  <circle cx="79" cy="21" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="80" cy="33" r="1.1" fill="white" opacity="0.6"/>
</svg>
